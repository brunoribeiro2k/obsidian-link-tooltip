name: Release

# When a version bump lands on the default branch, tag it and draft a GitHub
# release. Detection is driven by manifest.json: if its version has no release
# yet, this builds the plugin, pushes the matching tag, and creates a draft
# release with the assets. Idempotent — pushes that don't change the version
# (or re-runs) are a no-op.
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read manifest version
        id: manifest
        run: echo "version=$(node -p "require('./manifest.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.manifest.outputs.version }}"
          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release $version already exists — nothing to do."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $version"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.check.outputs.release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Build plugin
        if: steps.check.outputs.release == 'true'
        run: |
          npm ci
          npm run build

      - name: Attest build provenance
        if: steps.check.outputs.release == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Push tag
        if: steps.check.outputs.release == 'true'
        run: |
          version="${{ steps.manifest.outputs.version }}"
          git tag "$version"
          git push origin "$version"

      - name: Create draft release
        id: release
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.manifest.outputs.version }}"
          url="$(gh release create "$version" \
            --title="$version" \
            --draft \
            --generate-notes \
            main.js manifest.json styles.css)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Report
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.manifest.outputs.version }}"
          url="${{ steps.release.outputs.url }}"
          {
            echo "### 📦 Drafted release \`$version\`"
            echo ""
            echo "- Tag \`$version\` pushed"
            echo "- Draft release with \`main.js\`, \`manifest.json\`, \`styles.css\` (provenance attested)"
            echo "- Review the notes and publish: $url"
          } >> "$GITHUB_STEP_SUMMARY"
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -f body="📦 Drafted release [\`$version\`]($url) from this commit — review the notes and publish when ready."
